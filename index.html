<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Portal de Curadoria Técnica</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; margin: 0; background-color: #f4f7f6; color: #333; }
        
        /* Header */
        header { background: #fff; padding: 20px; border-bottom: 3px solid #27ae60; display: flex; align-items: center; gap: 15px; }
        .logo { width: 50px; height: 50px; background: #2c3e50; border-radius: 8px; }
        header h1 { margin: 0; font-size: 20px; }

        .logo {
                width: 50px;
                height: 50px;
                overflow: hidden; /* Garante que a imagem não saia do tamanho da div */
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                }
        .logo img {
                width: 160%;
                height: 160%;
                object-fit: contain; /* Isso faz a imagem se ajustar sem deformar */
                }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        
        /* Grid de Categorias */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { color: #2c3e50; margin-top: 0; }
        .card a { display: inline-block; background: #27ae60; color: #fff; padding: 10px 20px; border-radius: 6px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
    <img src="logo.png" alt="Logo"> <!-- Aqui vai sua imagem de logo -->
    </div>
    <h1>PROMO FINDS</h1>
</header>

<div class="container">
    <h2>Explore nossas categorias</h2>
    
    <div class="category-grid">
        <!-- Categoria 1 -->
        <div class="card">
            <h3>Skincare & Estética</h3>
            <p>Análises técnicas e rotinas de cuidados com a pele.</p>
            <a href="/promofinds/pages/cat1.html">Ver Categoria</a>
        </div>

        </div>
    </div>
</div>

</body>
<!-- Exemplo de como adicionar o rodapé no seu index.html -->
<footer>

       <a href="privacidade.html">Política de Privacidade</a>
    </p>
</footer>
</html>
